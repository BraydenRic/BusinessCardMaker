<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Card background -->
  <rect x="2" y="6" width="28" height="20" rx="2.5" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Name line (long) -->
